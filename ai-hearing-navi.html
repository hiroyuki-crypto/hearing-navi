<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヒアリングナビ｜キャンディハウス</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap') screen;

  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --text: #1A1714;
    --text-sub: #6B6460;
    --accent: #D9622B;
    --accent-light: #FBF0EB;
    --border: #E5E0D8;
    --progress-bg: #EDE9E3;
    --step-color: #D9622B;

    --candy: #D9622B;
    --candy-bg: #FBF0EB;
    --hiraya: #2B7BD9;
    --hiraya-bg: #EBF3FB;
    --ion: #2BAB5A;
    --ion-bg: #EBF8F0;
    --chintai: #8B4DB8;
    --chintai-bg: #F5EDFB;

    --radius: 12px;
    --radius-lg: 20px;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 14px;
  }
  .header-badge {
    font-size: 12px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* PROGRESS */
  .progress-area {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--progress-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .step-dots {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .step-dot {
    height: 4px;
    flex: 1;
    border-radius: 2px;
    background: var(--progress-bg);
    transition: background var(--transition);
  }
  .step-dot.done { background: var(--accent); }
  .step-dot.active { background: var(--accent); opacity: 0.5; }

  /* MAIN */
  main {
    flex: 1;
    padding: 24px 16px 40px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  /* STEP LABEL */
  .step-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .step-label::before {
    content: '';
    display: block;
    width: 16px;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
  }

  /* QUESTION */
  .question-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 28px 24px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    animation: slideIn 0.25s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .question-text {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .question-hint {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    cursor: pointer;
    transition: all var(--transition);
    text-align: left;
    width: 100%;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    font-weight: 500;
  }
  .option-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    transform: translateX(2px);
  }
  .option-btn.selected {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent);
  }
  .option-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .option-btn.selected .option-circle {
    border-color: var(--accent);
    background: var(--accent);
  }
  .option-btn.selected .option-circle::after {
    content: '';
    display: block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: white;
  }
  .option-sub {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 400;
    margin-top: 2px;
  }
  .option-btn.selected .option-sub {
    color: #B84D18;
  }

  /* SCORE PREVIEW (small badges shown during hearing) */
  .score-preview {
    display: flex;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .score-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    opacity: 0.5;
    transition: all var(--transition);
  }
  .score-badge.leading {
    opacity: 1;
  }

  /* NAVIGATION */
  .nav-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
  }
  .btn-back {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--text-sub);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all var(--transition);
  }
  .btn-back:hover { border-color: var(--text-sub); }
  .btn-back:disabled { opacity: 0.3; cursor: default; }
  .btn-next {
    background: var(--accent);
    border: none;
    color: white;
    padding: 12px 28px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all var(--transition);
    box-shadow: 0 4px 14px rgba(217,98,43,0.3);
  }
  .btn-next:hover { background: #C0551F; transform: translateY(-1px); }
  .btn-next:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

  /* RESULT */
  .result-screen { animation: slideIn 0.3s ease-out; }

  .result-header {
    text-align: center;
    padding: 24px 0 16px;
  }
  .result-title {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .result-product {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-tagline {
    font-size: 14px;
    color: var(--text-sub);
  }

  .product-card {
    border-radius: var(--radius-lg);
    padding: 24px;
    margin: 16px 0;
    box-shadow: var(--shadow);
  }

  .score-bar-container {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .score-bar-title {
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .score-item {
    margin-bottom: 12px;
  }
  .score-item-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .score-item-bar {
    height: 8px;
    background: var(--progress-bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .score-item-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* CLOSING SCRIPT */
  .closing-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .closing-card h3 {
    font-size: 14px;
    color: var(--text-sub);
    margin-bottom: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .closing-card h3 .icon {
    font-size: 16px;
  }
  .script-bubble {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 10px;
  }
  .script-bubble:last-child { margin-bottom: 0; }

  .hearing-summary {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .hearing-summary h3 {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .summary-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .summary-item-label {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 3px;
  }
  .summary-item-value {
    font-size: 13px;
    font-weight: 700;
  }

  .btn-restart {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 14px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--transition);
    margin-top: 8px;
  }
  .btn-restart:hover { border-color: var(--text-sub); }

  /* WELCOME */
  .welcome-screen {
    text-align: center;
    padding: 40px 0 20px;
    animation: slideIn 0.3s ease-out;
  }
  .welcome-icon {
    width: 72px; height: 72px;
    background: var(--accent-light);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }
  .welcome-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .welcome-desc {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.7;
    max-width: 360px;
    margin: 0 auto 32px;
  }
  .welcome-tips {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    text-align: left;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .welcome-tips h3 {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .tip-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .tip-num {
    width: 20px; height: 20px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .btn-start {
    width: 100%;
    background: var(--accent);
    border: none;
    color: white;
    padding: 16px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition);
    box-shadow: 0 6px 20px rgba(217,98,43,0.35);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-start:hover { background: #C0551F; transform: translateY(-2px); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏠</div>
    ヒアリングナビ
  </div>
  <div class="header-badge">株式会社市兵衛</div>
</header>

<div class="progress-area" id="progressArea" style="display:none">
  <div class="progress-label">
    <span id="progressStep">STEP 1 / 6</span>
    <span id="progressPercent">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="step-dots" id="stepDots"></div>
</div>

<main id="mainContent">
</main>

      {

        options: [

      },
      {
        id: "q12",
        text: "こだわりで一番大切なことは？",
        hint: "提案の方向性を絞り込みます",
        options: [
          { text: "とにかくコスパ重視・安く建てたい", sub: "価格が最優先", score: { candy: 4 } },
          { text: "設備・キッチンにこだわりたい", sub: "住み心地を大切に", score: { candy: 1, chuko: 1 } },
          { text: "デザイン・外観にこだわりたい", sub: "見た目を大切に", score: { candy: 1 } },
          { text: "光熱費・省エネを重視", sub: "ランニングコスト優先", score: { candy: 1 } }
        ]
      }
    ]
  },
  {
    id: "s6",
    label: "STEP 6　時期・状況",
    questions: [
      {
        id: "q13",
        text: "いつ頃までに入居を希望しますか？",
        hint: "ご検討のスケジュールを把握します",
        options: [
          { text: "できるだけ早く（3ヶ月以内）", sub: "急ぎで動きたい", score: { candy: 2 }, urgent: true },
          { text: "半年以内が目標", sub: "今年中には入居したい", score: { candy: 1 } },
          { text: "1年以内", sub: "じっくり検討しながら", score: {} },
          { text: "まだ未定・情報収集中", sub: "いつでも相談できる", score: {} }
        ]
      },
      {
        id: "q14",
        text: "他社・他ブランドも検討していますか？",
        hint: "競合状況を把握してご提案を最適化",
        options: [
          { text: "まだここだけ", sub: "比較検討はしていない", score: { candy: 1 } },
          { text: "大手ハウスメーカーも見ている", sub: "ハウスメーカーと比較中", score: {} },
          { text: "地元の工務店も見ている", sub: "工務店と比較中", score: { candy: 1 } },
          { text: "複数社を比較中", sub: "しっかり比較して決めたい", score: {} }
        ]
      }
    ]
  }
];

const PRODUCTS = {
  candy:   { name: "キャンディハウス",   tagline: "ローコスト新築住宅", color: "#D9622B", bgColor: "#FBF0EB", icon: "🏡" },
  tatekae: { name: "平屋マーケット",     tagline: "平屋・建て替え専門", color: "#2B7BD9", bgColor: "#EBF3FB", icon: "🏠" },
  chuko:   { name: "イオンハウジング藤井寺", tagline: "中古＋リフォーム",  color: "#2BAB5A", bgColor: "#EBF8F0", icon: "🔑" },
  chintai: { name: "戸建賃貸",           tagline: "土地活用・相続対策",  color: "#8B4DB8", bgColor: "#F5EDFB", icon: "🏢" }
};

const CLOSING_SCRIPTS = {
  candy: [
    "「毎月○万円の家賃を払い続けるのは、もったいないと思いませんか？キャンディハウスなら、同じ支払い額で新築の『自分の家』に住めます。」",
    "「頭金がなくても、フルローンで新築が建てられます。今の家賃より安いケースも多いんですよ。」",
    "「キャンディハウスは、必要な部分に絞って価格を下げた商品です。品質はそのままで、とにかくお手頃に新築を実現できます。一度モデルハウスをご覧になりませんか？」"
  ],
  tatekae: [
    "「今の家が古くなっていることへのご不安、よくわかります。平屋マーケットなら、同じ敷地で新しい平屋に建て替えることができます。」",
    "「お一人やご夫婦お二人での暮らしには、平屋がとても機能的です。バリアフリーで将来も安心して暮らせます。」"
  ],
  chuko: [
    "「新築にこだわりたいお気持ちはわかりますが、予算的に難しい場合、中古＋リフォームという選択肢があります。」",
    "「中古物件にリフォームを加えれば、新築同様の内装・設備にできます。立地や価格は中古のメリットをそのままに、住み心地は新築以上になることもあります。」"
  ],
  chintai: [
    "「お持ちの土地を活用して、戸建賃貸にするという選択肢はご存知ですか？毎月の家賃収入で、安定したキャッシュフローをつくることができます。」",
    "「相続対策としても、土地に戸建を建てると評価額を大幅に下げることができます。一度、収支シミュレーションをしてみましょう。」"
  ]
};

function safeScrollTop() {
  try { window.scrollTo(0, 0); } catch(e) {}
  try { document.documentElement.scrollTop = 0; } catch(e) {}
}

// State
let currentScreen = "welcome"; // welcome, hearing, result
let currentStepIdx = 0;
let currentQIdx = 0;
let answers = {};
let scores = { candy: 0, tatekae: 0, chuko: 0, chintai: 0 };
let allQuestions = [];

// Flatten all questions
STEPS.forEach((step, si) => {
  step.questions.forEach((q, qi) => {
    allQuestions.push({ ...q, stepIdx: si, stepLabel: step.label });
  });
});

let totalQuestions = allQuestions.length;
let currentQFlat = 0; // flat index

function init() {
  render();
}

function render() {
  const main = document.getElementById('mainContent');
  const progressArea = document.getElementById('progressArea');

  if (currentScreen === "welcome") {
    progressArea.style.display = "none";
    main.innerHTML = renderWelcome();
  } else if (currentScreen === "hearing") {
    progressArea.style.display = "block";
    updateProgress();
    const q = allQuestions[currentQFlat];
    main.innerHTML = renderQuestion(q);
  } else if (currentScreen === "result") {
    progressArea.style.display = "none";
    main.innerHTML = renderResult();
    setTimeout(() => animateBars(), 100);
  }
}

function renderWelcome() {
  return `
  <div class="welcome-screen">
    <div class="welcome-icon">🏘️</div>
    <div class="welcome-title">ヒアリングナビへようこそ</div>
    <div class="welcome-desc">お客様の状況をヒアリングして、最適な商材と<br>クロージングトークをご提案します</div>
    <div class="welcome-tips">
      <h3>使い方のポイント</h3>
      <div class="tip-item">
        <div class="tip-num">1</div>
        <div>お客様に質問を読み上げ、当てはまる回答を選んでタップしてください</div>
      </div>
      <div class="tip-item">
        <div class="tip-num">2</div>
        <div>全14問のヒアリング後、商材が自動診断されます</div>
      </div>
      <div class="tip-item">
        <div class="tip-num">3</div>
        <div>クロージングトークスクリプトが自動表示されます</div>
      </div>
    </div>
    <button class="btn-start" onclick="startHearing()">
      ヒアリングをはじめる ▶
    </button>
  </div>`;
}

function renderQuestion(q) {
  const selectedVal = answers[q.id];
  const stepInfo = `STEP ${q.stepIdx + 1}　${STEPS[q.stepIdx].label.replace(/STEP \d\s*/, '')}`;

  let optionsHtml = q.options.map((opt, i) => `
    <button class="option-btn ${selectedVal === i ? 'selected' : ''}"
      onclick="selectOption(${i})">
      <div class="option-circle"></div>
      <div>
        <div>${opt.text}</div>
        ${opt.sub ? `<div class="option-sub">${opt.sub}</div>` : ''}
      </div>
    </button>
  `).join('');

  const isFirst = currentQFlat === 0;
  const isLast = currentQFlat === totalQuestions - 1;
  const hasAnswer = selectedVal !== undefined;

  return `
  <div class="question-card">
    <div class="step-label">${stepInfo}</div>
    <div class="question-text">${q.text}</div>
    ${q.hint ? `<div class="question-hint">${q.hint}</div>` : ''}
    <div class="options">${optionsHtml}</div>
  </div>
  <div class="nav-area">
    <button class="btn-back" onclick="goBack()" ${isFirst ? 'disabled' : ''}>
      ← 戻る
    </button>
    <button class="btn-next" onclick="goNext()" ${!hasAnswer ? 'disabled' : ''}>
      ${isLast ? '診断する ✓' : '次へ →'}
    </button>
  </div>`;
}

function renderResult() {
  const topProduct = getTopProduct();
  const product = PRODUCTS[topProduct];
  const scripts = CLOSING_SCRIPTS[topProduct] || [];

  // Build score bars
  const maxScore = Math.max(...Object.values(scores), 1);
  const barHtml = Object.entries(PRODUCTS).map(([key, p]) => {
    const pct = Math.round((scores[key] / maxScore) * 100);
    return `
    <div class="score-item">
      <div class="score-item-label">
        <span>${p.name}</span>
        <span style="color:${p.color}">${scores[key]}pt</span>
      </div>
      <div class="score-item-bar">
        <div class="score-item-fill" id="bar-${key}" style="width:0%;background:${p.color}" data-target="${pct}"></div>
      </div>
    </div>`;
  }).join('');

  // Build summary
  const summaryItems = [
    { label: "住まいの状況", qid: "q1" },
    { label: "家族構成", qid: "q2" },
    { label: "きっかけ", qid: "q4" },
    { label: "月々の予算", qid: "q6" },
    { label: "土地", qid: "q9" },
    { label: "入居希望時期", qid: "q13" }
  ].map(item => {
    const q = allQuestions.find(q => q.id === item.qid);
    const aIdx = answers[item.qid];
    const aText = (q && aIdx !== undefined) ? q.options[aIdx].text : "未回答";
    return `
    <div class="summary-item">
      <div class="summary-item-label">${item.label}</div>
      <div class="summary-item-value">${aText}</div>
    </div>`;
  }).join('');

  const scriptHtml = scripts.map(s => `<div class="script-bubble">${s}</div>`).join('');

  return `
  <div class="result-screen">
    <div class="result-header">
      <div class="result-title">🎯 診断結果</div>
      <div class="result-product" style="color:${product.color}">${product.icon} ${product.name}</div>
      <div class="result-tagline">${product.tagline}</div>
    </div>

    <div class="score-bar-container">
      <div class="score-bar-title">商材スコア（高いほど適合度が高い）</div>
      ${barHtml}
    </div>

    <div class="closing-card">
      <h3><span class="icon">💬</span>クロージングトークスクリプト</h3>
      ${scriptHtml}
    </div>

    <div class="hearing-summary">
      <h3>ヒアリング内容サマリー</h3>
      <div class="summary-grid">${summaryItems}</div>
    </div>

    <button class="btn-restart" onclick="restart()">🔄 最初からやり直す</button>
  </div>`;
}

function animateBars() {
  document.querySelectorAll('.score-item-fill').forEach(bar => {
    const target = bar.getAttribute('data-target');
    bar.style.width = target + '%';
  });
}

function getTopProduct() {
  return Object.entries(scores).reduce((a, b) => b[1] > a[1] ? b : a)[0];
}

function updateProgress() {
  const pct = Math.round((currentQFlat / totalQuestions) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  const q = allQuestions[currentQFlat];
  document.getElementById('progressStep').textContent = `STEP ${q.stepIdx + 1} / 6　Q${currentQFlat + 1} / ${totalQuestions}`;
  document.getElementById('progressPercent').textContent = pct + '%';

  // Step dots
  const dotsEl = document.getElementById('stepDots');
  dotsEl.innerHTML = STEPS.map((_, i) => {
    let cls = '';
    if (i < q.stepIdx) cls = 'done';
    else if (i === q.stepIdx) cls = 'active';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('');
}

function startHearing() {
  currentScreen = "hearing";
  currentQFlat = 0;
  answers = {};
  scores = { candy: 0, tatekae: 0, chuko: 0, chintai: 0 };
  render();
}

function restart() {
  currentScreen = "welcome";
  currentQFlat = 0;
  answers = {};
  scores = { candy: 0, tatekae: 0, chuko: 0, chintai: 0 };
  render();
  safeScrollTop();
}

function selectOption(optIdx) {
  const q = allQuestions[currentQFlat];
  const prevIdx = answers[q.id];

  // Subtract previous score if re-selecting
  if (prevIdx !== undefined) {
    const prevOpt = q.options[prevIdx];
    if (prevOpt && prevOpt.score) {
      Object.entries(prevOpt.score).forEach(([k, v]) => { scores[k] = (scores[k] || 0) - v; });
    }
  }

  // Set new answer and add new score
  answers[q.id] = optIdx;
  const opt = q.options[optIdx];
  if (opt && opt.score) {
    Object.entries(opt.score).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });
  }

  render();
}

function goNext() {
  if (answers[allQuestions[currentQFlat].id] === undefined) return;
  if (currentQFlat < totalQuestions - 1) {
    currentQFlat++;
    render();
    safeScrollTop();
  } else {
    currentScreen = "result";
    render();
    safeScrollTop();
  }
}

function goBack() {
  if (currentQFlat > 0) {
    currentQFlat--;
    render();
    safeScrollTop();
  }
}

init();
</script>
</body>
</html>
