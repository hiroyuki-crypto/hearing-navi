<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>キャンディハウス 営業ナビ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --text: #1A1714;
    --muted: #6B6460;
    --border: #E5E0D8;
    --accent: #E8743A;
    --accent-hover: #D0652F;
    --accent-soft: #FDF0E9;
    --navy: #1C2B4A;
    --navy-light: #4A6FA5;
    --danger: #B3261E;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== API Key Bar ===== */
  .api-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .api-bar-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 800px;
    margin: 0 auto;
  }
  .api-bar label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    white-space: nowrap;
  }
  .api-bar input {
    flex: 1;
    min-width: 0;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
  }
  .api-bar input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .api-status {
    font-size: 11px;
    white-space: nowrap;
  }
  .api-status.ok { color: #2e7d32; }
  .api-status.ng { color: var(--danger); }

  /* ===== Screens ===== */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; flex: 1; }

  /* ===== Start Screen ===== */
  .start-screen {
    justify-content: center;
    align-items: center;
    padding: 32px 16px;
    text-align: center;
  }
  .start-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 40px 28px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 420px;
  }
  .start-emoji { font-size: 48px; margin-bottom: 12px; }
  .start-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .start-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.6;
  }
  .field-group { margin-bottom: 20px; text-align: left; }
  .field-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--muted);
  }
  .field-group input {
    width: 100%;
    padding: 14px 16px;
    font-size: 18px;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: var(--radius);
  }
  .field-group input:focus { outline: none; border-color: var(--accent); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 52px;
    padding: 14px 28px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    width: 100%;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== Nav Screen ===== */
  .nav-screen { padding: 0; }

  .nav-header {
    background: var(--navy);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 41px;
    z-index: 50;
  }
  .nav-brand {
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-phase {
    font-size: 13px;
    background: rgba(255,255,255,0.15);
    padding: 4px 14px;
    border-radius: 20px;
  }

  .nav-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 160px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 14px;
    animation: cardIn 0.22s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-nav {
    border-left: 4px solid var(--navy-light);
  }
  .card-script {
    border-left: 4px solid var(--accent);
  }
  .card-hint {
    border-left: 4px solid var(--accent);
    background: var(--accent-soft);
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-label.blue { color: var(--navy-light); }
  .card-label.orange { color: var(--accent); }

  .card-nav .card-body {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }
  .card-script .card-body {
    font-size: 20px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--text);
  }
  .card-hint .card-body {
    font-size: 14px;
    line-height: 1.65;
    color: var(--muted);
  }

  .loading-card {
    text-align: center;
    padding: 28px;
    color: var(--muted);
    font-size: 15px;
  }
  .dot-pulse::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  .error-msg {
    background: #FDE8E6;
    color: var(--danger);
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.55;
    margin-bottom: 14px;
  }

  /* ===== Input Bar (bottom fixed) ===== */
  .input-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    z-index: 60;
  }
  .input-bar-inner {
    display: flex;
    gap: 10px;
    max-width: 800px;
    margin: 0 auto;
    align-items: flex-end;
  }
  .input-bar textarea {
    flex: 1;
    resize: none;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    line-height: 1.45;
    min-height: 48px;
    max-height: 120px;
    overflow-y: auto;
  }
  .input-bar textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .input-bar textarea::placeholder { color: #B0AAA4; }

  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 22px; height: 22px; }

  /* ===== History (user bubbles) ===== */
  .user-bubble {
    background: var(--navy);
    color: #fff;
    padding: 12px 16px;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    margin-bottom: 14px;
    font-size: 15px;
    line-height: 1.55;
    max-width: 85%;
    margin-left: auto;
    animation: cardIn 0.2s ease;
  }
  .user-label {
    font-size: 11px;
    opacity: 0.65;
    margin-bottom: 4px;
  }

  .restart-row {
    text-align: center;
    margin-top: 10px;
    margin-bottom: 20px;
  }
  .restart-link {
    font-size: 13px;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }
  .restart-link:hover { color: var(--accent); }

  /* ===== Undo button ===== */
  .undo-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .undo-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .undo-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .undo-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .undo-btn:disabled:hover { background: var(--surface); color: var(--muted); border-color: var(--border); }

  /* ===== Survey Screen ===== */
  .survey-screen {
    padding: 0;
  }
  .survey-header {
    background: var(--navy);
    color: #fff;
    padding: 14px 20px;
    text-align: center;
    position: sticky;
    top: 41px;
    z-index: 50;
  }
  .survey-header-title {
    font-size: 16px;
    font-weight: 700;
  }
  .survey-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 32px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }
  .survey-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 18px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .survey-card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .survey-card-title .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .checkbox-group, .radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .checkbox-group label, .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .checkbox-group label:has(input:checked),
  .radio-group label:has(input:checked) {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .checkbox-group input, .radio-group input {
    accent-color: var(--accent);
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  .survey-input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: var(--radius);
  }
  .survey-input:focus { outline: none; border-color: var(--accent); }

  .survey-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .survey-input-row input {
    max-width: 120px;
  }
  .survey-input-row .unit {
    font-size: 15px;
    color: var(--muted);
    white-space: nowrap;
  }

  .survey-textarea {
    width: 100%;
    min-height: 72px;
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    resize: vertical;
    line-height: 1.5;
  }
  .survey-textarea:focus { outline: none; border-color: var(--accent); }

  .survey-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .survey-footer {
    padding: 0 16px 32px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }
</style>
</head>
<body>

<!-- API Key Bar -->
<div class="api-bar">
  <div class="api-bar-inner">
    <label for="apiKey">APIキー</label>
    <input type="password" id="apiKey" autocomplete="off" placeholder="sk-ant-api03-...">
    <span class="api-status" id="apiStatus"></span>
  </div>
</div>

<!-- Start Screen -->
<div id="screenStart" class="screen start-screen active">
  <div class="start-card">
    <div class="start-emoji">🍬</div>
    <div class="start-title">キャンディハウス 営業ナビ</div>
    <p class="start-sub">AIがトークの流れをリード。<br>表示されたセリフを読み上げるだけでOKです。</p>
    <div class="field-group">
      <label for="customerName">お客様の苗字</label>
      <input type="text" id="customerName" placeholder="例：田中">
    </div>
    <button type="button" class="btn btn-accent" id="btnStart">スタート</button>
  </div>
</div>

<!-- Survey Screen -->
<div id="screenSurvey" class="screen survey-screen">
  <div class="survey-header">
    <div class="survey-header-title">📋 アンケート情報を入力</div>
  </div>
  <div class="survey-body">

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">1</span>家族構成</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">同席者（複数選択可）</p>
      <div class="checkbox-group" id="attendees">
        <label><input type="checkbox" value="ご主人様">ご主人様</label>
        <label><input type="checkbox" value="奥様">奥様</label>
        <label><input type="checkbox" value="お父様">お父様</label>
        <label><input type="checkbox" value="お母様">お母様</label>
        <label><input type="checkbox" value="お子様">お子様</label>
      </div>
      <div class="survey-input-row" style="margin-top:12px;">
        <label style="font-size:13px;color:var(--muted);white-space:nowrap;">家族人数</label>
        <input type="number" class="survey-input" id="familyCount" min="1" max="20" placeholder="例：4" style="max-width:100px;">
        <span class="unit">人</span>
      </div>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">2</span>現在の住まい</div>
      <div class="radio-group" id="housing">
        <label><input type="radio" name="housing" value="アパート">アパート</label>
        <label><input type="radio" name="housing" value="持家">持家</label>
        <label><input type="radio" name="housing" value="同居">同居</label>
        <label><input type="radio" name="housing" value="公営住宅">公営住宅</label>
        <label><input type="radio" name="housing" value="その他">その他</label>
      </div>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">3</span>家賃（駐車場代込み）</div>
      <div class="survey-input-row">
        <input type="number" class="survey-input" id="rent" min="0" placeholder="例：7" style="max-width:120px;">
        <span class="unit">万円</span>
      </div>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">4</span>予算感</div>
      <div class="radio-group" id="budget">
        <label><input type="radio" name="budget" value="1500万以下">1500万以下</label>
        <label><input type="radio" name="budget" value="1800万以下">1800万以下</label>
        <label><input type="radio" name="budget" value="2000万以下">2000万以下</label>
        <label><input type="radio" name="budget" value="2500万以下">2500万以下</label>
        <label><input type="radio" name="budget" value="3000万以下">3000万以下</label>
        <label><input type="radio" name="budget" value="3500万以上">3500万以上</label>
        <label><input type="radio" name="budget" value="決まっていない">決まっていない</label>
      </div>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">5</span>土地の有無</div>
      <div class="radio-group" id="land">
        <label><input type="radio" name="land" value="持っている">持っている</label>
        <label><input type="radio" name="land" value="持っていない">持っていない</label>
      </div>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">6</span>建築時期</div>
      <div class="radio-group" id="timing">
        <label><input type="radio" name="timing" value="半年以内">半年以内</label>
        <label><input type="radio" name="timing" value="1年以内">1年以内</label>
        <label><input type="radio" name="timing" value="まだ先">まだ先</label>
      </div>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">7</span>来場きっかけ</div>
      <textarea class="survey-textarea" id="visitReason" placeholder="例：チラシを見て、通りがかりで…"></textarea>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">8</span>家づくりのきっかけ</div>
      <textarea class="survey-textarea" id="buildReason" placeholder="例：子供が大きくなってきた、家賃がもったいない…"></textarea>
    </div>

    <div class="survey-card">
      <div class="survey-card-title"><span class="num">9</span>現在の住まいの不満</div>
      <textarea class="survey-textarea" id="complaint" placeholder="例：狭い、古い、収納が少ない…"></textarea>
    </div>

    <p class="survey-note" style="text-align:center;margin-bottom:14px;">※すべて任意入力です。空欄でも次に進めます。</p>
  </div>
  <div class="survey-footer">
    <button type="button" class="btn btn-accent" id="btnSurveyStart">ヒアリング開始</button>
  </div>
</div>

<!-- Nav Screen -->
<div id="screenNav" class="screen nav-screen">
  <div class="nav-header">
    <span class="nav-brand">🍬 キャンディハウス</span>
    <span class="nav-phase" id="phaseLabel">—</span>
  </div>
  <div class="nav-body" id="navBody"></div>

  <div class="input-bar">
    <div class="input-bar-inner">
      <textarea id="userInput" rows="1" placeholder="お客様の発言を入力（Shift+Enterで送信）"></textarea>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <button type="button" class="send-btn" id="btnSend" aria-label="送信">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
        <span style="font-size:10px;color:var(--muted);white-space:nowrap;">Shift+Enter</span>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var SYSTEM_PROMPT =
    'あなたはキャンディハウスの住宅営業コンサルタントAIです。\n' +
    'スタッフは生成したセリフをそのまま読み上げます。\n\n' +
    'キャンディハウス：超ローコスト完全注文住宅。大阪近畿特化。建物1500万円前後。' +
    '1800万円の品質を1500万円で提供。ターゲット：年収300〜500万の30〜40代ファミリー。\n\n' +
    'フロー：STEP1 フロントトーク→STEP2 円トーク→STEP3 進め方トーク→STEP4 テストクロージング→STEP5 阻害要因対応（競合/借金/家族/時期）→パートナー申込\n\n' +
    '【アンケート情報の扱い】\n' +
    '- アンケートの「同席者」は事前記入された家族構成であり、今日の来場者とは限らない。\n' +
    '- 例：アンケートに「ご主人様・奥様」とあっても、実際はご主人様だけかもしれない。\n' +
    '- そのため最初のセリフで必ず「今日はお一人で来られましたか？」等と実際の来場者を確認する。\n' +
    '- アンケートの他の項目（住まい・家賃・予算・土地・時期など）も参考情報として活用し、会話の中で自然に確認・深掘りする。\n\n' +
    '【セリフのトーン（厳守）】\n' +
    '- 敬語は使うが堅苦しくしない。関西のハウスメーカースタッフが自然に話す感じ。\n' +
    '- 一文は短くテンポよく。長い文は2つに分ける。\n' +
    '- 「ございます」は使わない。\n' +
    '- 「いらっしゃいますか？」→「ありますか？」に言い換える。\n' +
    '- 「お考えですか？」→「どう思ってます？」に言い換える。\n' +
    '- 語尾は「〜ですか？」「〜ですね」「〜んですか？」を中心に。\n' +
    '- 例：× 「本日はキャンディハウスへご来場いただき、ありがとうございます」\n' +
    '       ○ 「今日は来てくれてありがとうございます！」\n' +
    '- 例：× 「どういったご不満がいらっしゃいますか？」\n' +
    '       ○ 「今のアパート、何か不便なこととかありますか？」\n' +
    '- 例：× 「新しいお家では、どんなお部屋を作ってあげたいとお考えですか？」\n' +
    '       ○ 「新しい家やったら、どんな部屋がほしいですか？」\n\n' +
    '出力は必ずこの形式のみ：\n' +
    'PHASE: （ステップ名）\n' +
    'NAV: （状況説明2〜3文）\n' +
    'SCRIPT: 「（読み上げセリフ）」\n' +
    'HINT: （条件分岐ヒントまたはなし）\n\n' +
    '上記以外のテキストを出力しないこと。';

  var API_URL = 'https://api.anthropic.com/v1/messages';
  var MODEL = 'claude-haiku-4-5-20251001';
  var MAX_TOKENS = 600;
  var LS_KEY = 'candy-house-api-key';

  var el = {
    apiKey: document.getElementById('apiKey'),
    apiStatus: document.getElementById('apiStatus'),
    screenStart: document.getElementById('screenStart'),
    screenSurvey: document.getElementById('screenSurvey'),
    screenNav: document.getElementById('screenNav'),
    customerName: document.getElementById('customerName'),
    btnStart: document.getElementById('btnStart'),
    btnSurveyStart: document.getElementById('btnSurveyStart'),
    phaseLabel: document.getElementById('phaseLabel'),
    navBody: document.getElementById('navBody'),
    userInput: document.getElementById('userInput'),
    btnSend: document.getElementById('btnSend'),
    btnUndo: null
  };

  var conversationHistory = [];
  var sending = false;
  var currentCustomer = '';
  var activeSystemPrompt = SYSTEM_PROMPT;
  var turnGroups = [];

  // --- API Key persistence ---
  el.apiKey.value = localStorage.getItem(LS_KEY) || '';
  updateKeyStatus();

  el.apiKey.addEventListener('input', function () {
    localStorage.setItem(LS_KEY, el.apiKey.value.trim());
    updateKeyStatus();
  });

  function updateKeyStatus() {
    var k = el.apiKey.value.trim();
    if (!k) {
      el.apiStatus.textContent = '';
      el.apiStatus.className = 'api-status';
    } else {
      el.apiStatus.textContent = '保存済';
      el.apiStatus.className = 'api-status ok';
    }
  }

  function getApiKey() { return el.apiKey.value.trim(); }

  // --- Screen switching ---
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function (s) {
      s.classList.toggle('active', s.id === id);
    });
  }

  // --- Auto-resize textarea ---
  el.userInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // --- Parse AI response ---
  function parseResponse(text) {
    var raw = (text || '').trim();
    var phase = '', nav = '', script = '', hint = '';

    var m;
    m = raw.match(/PHASE:\s*(.+?)(?:\n|$)/);
    if (m) phase = m[1].trim();

    m = raw.match(/NAV:\s*([\s\S]+?)(?=\nSCRIPT:|\nHINT:|$)/);
    if (m) nav = m[1].trim();

    m = raw.match(/SCRIPT:\s*([\s\S]+?)(?=\nHINT:|$)/);
    if (m) script = m[1].trim();

    m = raw.match(/HINT:\s*([\s\S]+?)$/);
    if (m) hint = m[1].trim();

    return { phase: phase, nav: nav, script: script, hint: hint };
  }

  // --- Render cards ---
  function renderAiTurn(parsed, prevPhase) {
    var elements = [];

    if (parsed.phase) {
      el.phaseLabel.textContent = parsed.phase;
    }

    if (parsed.nav) {
      var navCard = document.createElement('div');
      navCard.className = 'card card-nav';
      navCard.innerHTML =
        '<div class="card-label blue">📊 AI分析</div>' +
        '<div class="card-body"></div>';
      navCard.querySelector('.card-body').textContent = parsed.nav;
      el.navBody.appendChild(navCard);
      elements.push(navCard);
    }

    if (parsed.script) {
      var scriptCard = document.createElement('div');
      scriptCard.className = 'card card-script';
      scriptCard.innerHTML =
        '<div class="card-label orange">🎤 読み上げスクリプト</div>' +
        '<div class="card-body"></div>';
      scriptCard.querySelector('.card-body').textContent = parsed.script;
      el.navBody.appendChild(scriptCard);
      elements.push(scriptCard);
    }

    if (parsed.hint && parsed.hint !== 'なし') {
      var hintCard = document.createElement('div');
      hintCard.className = 'card card-hint';
      hintCard.innerHTML =
        '<div class="card-label orange">💡 場合分けヒント</div>' +
        '<div class="card-body"></div>';
      hintCard.querySelector('.card-body').textContent = parsed.hint;
      el.navBody.appendChild(hintCard);
      elements.push(hintCard);
    }

    turnGroups.push({
      domElements: elements,
      historyCount: 2,
      prevPhase: prevPhase || '—'
    });
    updateUndoBtn();

    scrollToBottom();
  }

  function renderUserBubble(text) {
    var div = document.createElement('div');
    div.className = 'user-bubble';
    div.innerHTML = '<div class="user-label">お客様の発言</div>';
    var body = document.createElement('div');
    body.textContent = text;
    div.appendChild(body);
    el.navBody.appendChild(div);

    if (turnGroups.length > 0) {
      turnGroups[turnGroups.length - 1].domElements.push(div);
    }

    scrollToBottom();
  }

  function updateUndoBtn() {
    if (!el.btnUndo) return;
    el.btnUndo.disabled = turnGroups.length <= 1 || sending;
  }

  function undoLastTurn() {
    if (turnGroups.length <= 1 || sending) return;

    var last = turnGroups.pop();
    last.domElements.forEach(function (node) { node.remove(); });

    conversationHistory.splice(-last.historyCount);
    el.phaseLabel.textContent = last.prevPhase;

    updateUndoBtn();
    scrollToBottom();
  }

  function renderLoading() {
    var div = document.createElement('div');
    div.className = 'card loading-card';
    div.id = 'loadingCard';
    div.innerHTML = '<span class="dot-pulse">AI分析中</span>';
    el.navBody.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeLoading() {
    var lc = document.getElementById('loadingCard');
    if (lc) lc.remove();
  }

  function renderError(msg) {
    var div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = msg;
    el.navBody.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    requestAnimationFrame(function () {
      el.navBody.scrollTop = el.navBody.scrollHeight;
    });
  }

  // --- Claude API ---
  async function callClaude() {
    var key = getApiKey();
    if (!key) throw new Error('APIキーを入力してください。');

    var res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: MAX_TOKENS,
        system: activeSystemPrompt,
        messages: conversationHistory
      })
    });

    if (!res.ok) {
      var errText = '';
      try { errText = await res.text(); } catch (e) {}
      if (res.status === 401) throw new Error('APIキーが無効です。正しいキーを入力してください。');
      throw new Error('APIエラー (' + res.status + ') ' + errText);
    }

    var data = await res.json();
    var block = data.content && data.content[0];
    if (!block || block.type !== 'text') throw new Error('想定外のレスポンス形式です。');
    return block.text;
  }

  // --- Send message flow ---
  async function sendMessage(userText) {
    if (sending) return;
    sending = true;
    el.btnSend.disabled = true;
    updateUndoBtn();

    var prevPhase = el.phaseLabel.textContent;
    conversationHistory.push({ role: 'user', content: userText });
    var loader = renderLoading();

    try {
      var raw = await callClaude();
      removeLoading();

      conversationHistory.push({ role: 'assistant', content: raw });
      var parsed = parseResponse(raw);
      renderAiTurn(parsed, prevPhase);
    } catch (err) {
      removeLoading();
      conversationHistory.pop();
      renderError(err.message || 'エラーが発生しました。もう一度試してください。');
    }

    sending = false;
    el.btnSend.disabled = false;
    updateUndoBtn();
    el.userInput.focus();
  }

  // --- Collect survey data ---
  function collectSurvey() {
    var UNKNOWN = '不明（会話の中で確認する）';

    var checked = [];
    document.querySelectorAll('#attendees input:checked').forEach(function (cb) {
      checked.push(cb.value);
    });
    var attendees = checked.length ? checked.join('、') : UNKNOWN;

    var familyCount = document.getElementById('familyCount').value.trim();
    if (familyCount) attendees += '（家族' + familyCount + '人）';

    var housingEl = document.querySelector('input[name="housing"]:checked');
    var housing = housingEl ? housingEl.value : UNKNOWN;

    var rentVal = document.getElementById('rent').value.trim();
    var rent = rentVal ? rentVal + '万円' : UNKNOWN;

    var budgetEl = document.querySelector('input[name="budget"]:checked');
    var budget = budgetEl ? budgetEl.value : UNKNOWN;

    var landEl = document.querySelector('input[name="land"]:checked');
    var land = landEl ? landEl.value : UNKNOWN;

    var timingEl = document.querySelector('input[name="timing"]:checked');
    var timing = timingEl ? timingEl.value : UNKNOWN;

    var visitReason = document.getElementById('visitReason').value.trim() || UNKNOWN;
    var buildReason = document.getElementById('buildReason').value.trim() || UNKNOWN;
    var complaint = document.getElementById('complaint').value.trim() || UNKNOWN;

    return '\n\n---アンケート情報---\n' +
      '同席者：' + attendees + '\n' +
      '現在の住まい：' + housing + '\n' +
      '家賃：' + rent + '\n' +
      '予算：' + budget + '\n' +
      '土地：' + land + '\n' +
      '建築時期：' + timing + '\n' +
      '来場きっかけ：' + visitReason + '\n' +
      '家づくりのきっかけ：' + buildReason + '\n' +
      '住まいの不満：' + complaint;
  }

  function resetSurveyForm() {
    document.querySelectorAll('#screenSurvey input[type="checkbox"], #screenSurvey input[type="radio"]').forEach(function (inp) {
      inp.checked = false;
    });
    document.querySelectorAll('#screenSurvey input[type="number"], #screenSurvey textarea').forEach(function (inp) {
      inp.value = '';
    });
  }

  // --- Start → Survey ---
  el.btnStart.addEventListener('click', function () {
    if (!getApiKey()) {
      el.apiStatus.textContent = '未入力';
      el.apiStatus.className = 'api-status ng';
      el.apiKey.focus();
      return;
    }
    currentCustomer = el.customerName.value.trim() || 'お客様';
    resetSurveyForm();
    showScreen('screenSurvey');
  });

  el.customerName.addEventListener('keydown', function (ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); el.btnStart.click(); }
  });

  // --- Survey → Nav ---
  el.btnSurveyStart.addEventListener('click', function () {
    var surveyText = collectSurvey();
    activeSystemPrompt = SYSTEM_PROMPT + surveyText;

    conversationHistory = [];
    turnGroups = [];
    el.navBody.innerHTML = '';
    el.phaseLabel.textContent = '—';

    var undoBar = document.createElement('div');
    undoBar.className = 'undo-bar';
    undoBar.innerHTML = '<button type="button" class="undo-btn" id="btnUndo" disabled>← 一つ前に戻る</button>';
    el.navBody.appendChild(undoBar);
    el.btnUndo = document.getElementById('btnUndo');
    el.btnUndo.addEventListener('click', undoLastTurn);

    var restartRow = document.createElement('div');
    restartRow.className = 'restart-row';
    restartRow.innerHTML = '<button type="button" class="restart-link" id="btnRestart">最初からやり直す</button>';
    el.navBody.appendChild(restartRow);
    document.getElementById('btnRestart').addEventListener('click', function () {
      conversationHistory = [];
      turnGroups = [];
      activeSystemPrompt = SYSTEM_PROMPT;
      el.customerName.value = '';
      showScreen('screenStart');
    });

    showScreen('screenNav');
    sendMessage(currentCustomer + '様がご来場されました。アンケート情報を踏まえて、STEP1 フロントトークの最初のセリフを生成してください。');
  });

  // --- User input ---
  function handleSend() {
    var text = el.userInput.value.trim();
    if (!text || sending) return;
    el.userInput.value = '';
    el.userInput.style.height = 'auto';
    renderUserBubble(text);
    sendMessage(currentCustomer + '様の発言：「' + text + '」');
  }

  el.btnSend.addEventListener('click', handleSend);

  el.userInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
})();
</script>
</body>
</html>
