<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI ヒアリングナビ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#1A1714;color:#E8E0D4;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;overflow:hidden}.phase-bar{background:#211E18;border-bottom:1px solid #3A3228;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}.phase-info{display:flex;align-items:center;gap:10px}.phase-icon{font-size:22px}.phase-num{font-size:11px;color:#9B8E7E;font-weight:600}.phase-label{font-size:16px;font-weight:700}.progress{display:flex;gap:5px}.progress-dot{width:28px;height:5px;border-radius:3px;transition:background 0.4s}.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px;overflow-y:auto}.tone-hint{display:inline-block;align-self:flex-start;background:rgba(184,151,106,0.1);border:1px solid rgba(184,151,106,0.25);border-radius:10px;padding:7px 16px;margin-bottom:14px;font-size:15px;color:#B8976A;font-weight:600}.card{background:#2C2418;border-radius:20px;padding:28px 22px;border:2px solid #3A3228}.card-label{font-size:12px;color:#9B8E7E;font-weight:600;margin-bottom:14px;letter-spacing:0.1em}.card-text{font-size:20px;font-weight:600;line-height:2;color:#E8E0D4}.card-tone{margin-top:14px;font-size:14px;color:#B8976A;font-weight:600}.listen-hint{text-align:center;margin-top:12px;font-size:14px;color:#6B5D4F}.listen-hint span{color:#9B8E7E}.status-bar{flex-shrink:0;background:#211E18;border-top:1px solid #3A3228;padding:16px 20px}.status-speaker{display:flex;align-items:center;gap:10px;margin-bottom:10px}.speaker-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.speaker-label{font-size:13px;font-weight:600}.status-text{background:#2C2418;border-radius:14px;padding:14px 16px;font-size:15px;line-height:1.8;color:#E8E0D4;min-height:52px;max-height:100px;overflow-y:auto;border:1px solid #3A3228;transition:border-color 0.3s}.status-text.staff{border-color:#5E8B6A}.status-text.customer{border-color:#C4713B}.countdown-bar{height:4px;background:#3A3228;border-radius:2px;margin-top:10px;overflow:hidden}.countdown-fill{height:100%;background:#C4713B;border-radius:2px;transition:width 0.3s linear}.full-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:32px;text-align:center}.fs-icon{font-size:56px;margin-bottom:20px}.fs-title{font-size:22px;font-weight:700;margin-bottom:6px}.fs-sub{font-size:13px;color:#B8976A;margin-bottom:6px}.fs-desc{font-size:15px;color:#6B5D4F;line-height:2.2;margin:28px 0 40px}.fs-desc span{color:#9B8E7E}.start-btn{background:#C4713B;color:#fff;border:none;border-radius:16px;padding:20px 48px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 24px rgba(196,113,59,0.3);-webkit-tap-highlight-color:transparent;touch-action:manipulation}.reset-btn{margin-top:32px;background:#3A3228;color:#E8E0D4;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.card.handoff{border-color:#5A3A28}.card.end{border-color:#2A4A32}.info-box{background:#1A2A20;border-radius:14px;padding:20px;border:1px solid #2A4A32;margin-top:20px;text-align:left}.info-box-label{font-size:11px;color:#5E8B6A;font-weight:600;margin-bottom:6px}.info-box-text{font-size:14px;color:#A0D4B0;line-height:2}.handoff-title{font-size:20px;font-weight:700;color:#C4713B;margin-bottom:24px}.end-title{font-size:20px;font-weight:700;color:#5E8B6A;margin-bottom:24px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var N={start:{p:1,s:"本日はお越しいただきありがとうございます。まずは今のお住まいのこと、少し聞かせていただけますか。今のお家は築何年くらいですか？",t:"笑顔で、ゆっくりと",l:"築年数",nx:"floor"},floor:{p:1,s:"ありがとうございます。2階は普段使われていますか？",t:"うなずきながら",l:"2階の利用状況",br:function(r){return/使って(ない|ません)|行かない|上がらない|しんどい|つらい/.test(r)?"floor_unused":"floor_used"}},floor_unused:{p:1,s:"そうですよね、階段はだんだんしんどくなりますよね。同じようなお声、本当に多いんですよ。今のお住まいで一番「困っているな」と感じることは何ですか？",t:"共感するように",l:"住まいの一番の不満",nx:"rebuild_q"},floor_used:{p:1,s:"なるほど。ちなみに、今のお住まいで「ここが不便だな」と感じていることはありますか？",t:"興味を持って",l:"住まいの不満",nx:"rebuild_q"},rebuild_q:{p:2,s:"ありがとうございます。ちなみに、建て替えはこれまで考えたことはありましたか？",t:"さりげなく",l:"建て替え検討の有無",br:function(r){return/考えた|ある|検討|したい|興味|気になる/.test(r)?"rebuild_yes":"rebuild_no"}},rebuild_yes:{p:2,s:"そうだったんですね。それでも踏み切れなかったのは、何かネックになることがあったんですか？",t:"寄り添うように",l:"踏み切れない理由",br:function(r){if(/子供|こども|跡継ぎ|相続|一人|独り|おらん|いない|誰も/.test(r))return"signal_no_heir";if(/もったいない|何年|あと|長く|住める|寿命/.test(r))return"signal_mottainai";if(/空き家|迷惑|近所|放置/.test(r))return"signal_akiya";if(/費用|お金|高い|予算|年金/.test(r))return"cost_concern";return"family_q"}},rebuild_no:{p:2,s:"なるほど。今の家にこのまま住み続けるご予定ですか？それとも、いつかは何か変えたいなというお気持ちはありますか？",t:"ゆっくりと",l:"将来への考え",nx:"family_q"},cost_concern:{p:2,s:"費用のこと、大事ですよね。よくわかります。ちなみにご家族構成を教えていただいてもいいですか？お子さんはいらっしゃいますか？",t:"丁寧に",l:"家族構成",br:function(r){if(/いない|おらん|おりません|いません|なし/.test(r))return"signal_no_heir";if(/いる|います|おる|おります|息子|娘/.test(r))return"has_children";return"future_q"}},family_q:{p:2,s:"ありがとうございます。ちなみに、ご家族構成を教えていただいてもいいですか？お子さんはいらっしゃいますか？",t:"自然に",l:"家族構成",br:function(r){if(/いない|おらん|おりません|いません|なし|夫婦だけ|二人|ふたり|一人|独身/.test(r))return"signal_no_heir";if(/いる|います|おる|おります|息子|娘/.test(r))return"has_children";return"future_q"}},signal_no_heir:{p:3,s:"そうなんですね。ありがとうございます。…ちなみに、将来この家をどうされたいとか、何かお考えはありますか？",t:"落ち着いて、ゆっくり",l:"家の将来への考え",br:function(r){if(/寄付|役に立|社会|誰か|届/.test(r))return"pitch_hot";if(/空き家|迷惑|壊す|更地|処分/.test(r))return"pitch_akiya";return"pitch_soft"}},signal_mottainai:{p:3,s:"「もったいない」って思いますよね。すごくよくわかります。ちなみにお子さんはいらっしゃいますか？",t:"共感して",l:"家族構成",br:function(r){return/いない|おらん|いません|なし/.test(r)?"signal_no_heir":"has_children"}},signal_akiya:{p:3,s:"空き家のこと、気にされているんですね。実は最近、同じ悩みを持たれている方がとても多いんです。ちなみにお子さんはいらっしゃいますか？",t:"共感して",l:"家族構成",br:function(r){return/いない|おらん|いません|なし/.test(r)?"signal_no_heir":"has_children"}},has_children:{p:3,s:"お子さんがいらっしゃるんですね。お子さんは将来この家に住まれるご予定ですか？それとも別のところにお住まいですか？",t:"自然に",l:"子供の居住予定",br:function(r){return/住む|戻る|近く|一緒/.test(r)?"pitch_family_stay":"pitch_family_away"}},future_q:{p:3,s:"ありがとうございます。少し先のことをお聞きしてもいいですか？将来、この家をどうされたいと思っていますか？",t:"落ち着いて",l:"家の将来への考え",br:function(r){return/子供|家族|残し|相続/.test(r)?"pitch_family_away":"pitch_soft"}},pitch_soft:{p:3,s:"実は最近、同じようなお悩みの方で「建て替える時に、家の未来も一緒に決めてしまう」という方が増えていまして。もったいないから建てない、じゃなくて、人の役に立てるから建てる、という考え方なんですが…少し詳しいお話、聞いてみたいですか？",t:"明るく、でも押さずに",l:"興味の有無",br:function(r){return/聞きたい|興味|知りたい|ぜひ|お願い|うん|はい|ほう|面白|へえ/.test(r)?"handoff_warm":"end_cool"}},pitch_akiya:{p:3,s:"空き家を防ぐ方法として、建て替えの時に「住まなくなった後の使い道」まで決めてしまう仕組みがあるんです。たとえば売却してその代金をどこかに届けたり、賃貸として誰かに住んでもらったり。…少し詳しく聞いてみたいですか？",t:"丁寧に、安心感を持って",l:"興味の有無",br:function(r){return/聞きたい|興味|知りたい|ぜひ|お願い|うん|はい|ほう|面白|へえ/.test(r)?"handoff_warm":"end_cool"}},pitch_hot:{p:3,s:"素晴らしいお考えですね！実はまさに、建て替えと同時に届け先を決められる仕組みがありまして。詳しいご説明ができる者がおりますので、少しお話しさせていただいてもいいですか？",t:"明るく嬉しそうに",l:"プロ接続の了承",nx:"handoff_hot"},pitch_family_away:{p:3,s:"なるほど。お子さんがこの家に住まれない場合、将来の家のことが少し気になりますよね。実は、建て替えの時に「家の未来」まで一緒に設計する仕組みがありまして。お子さんに資産として残すことも、社会に届けることもできるんです。少し聞いてみたいですか？",t:"寄り添うように",l:"興味の有無",br:function(r){return/聞きたい|興味|知りたい|ぜひ|お願い|うん|はい/.test(r)?"handoff_warm":"end_cool"}},pitch_family_stay:{p:3,s:"それは安心ですね。将来お子さんが住まれるなら、バリアフリーの平屋にしておくと長く使えますよ。平屋の間取りや費用について、詳しい者からご説明させていただいてもいいですか？",t:"自然に",l:"説明希望の有無",nx:"handoff_standard"},handoff_hot:{p:4,tp:"handoff",s:"ありがとうございます！それでは詳しい者をお呼びしますので、少々お待ちくださいね。",t:"嬉しそうに",rs:"お客様が寄付・社会貢献に強い関心。パターンA・Bを中心にご説明ください。"},handoff_warm:{p:4,tp:"handoff",s:"ありがとうございます。それでは、詳しい者からわかりやすくご説明させていただきますね。少々お待ちください。",t:"安心させるように",rs:"お客様が「家の未来」に興味あり。3パターンの概要からご説明ください。"},handoff_standard:{p:4,tp:"handoff",s:"ありがとうございます。それでは詳しい者をお呼びしますね。少々お待ちください。",t:"自然に",rs:"平屋の建て替えに興味あり。相続人がいるケース。パターンCを中心に。"},end_cool:{p:4,tp:"end",s:"もちろんです。無理にお勧めすることはありませんので、ご安心くださいね。本日は平屋のパンフレットをお渡ししますので、よかったらご覧になってみてください。本日はお越しいただき、ありがとうございました。",t:"笑顔で、温かく",ea:"パンフレットをお渡しして、お見送りしてください。後日フォローの電話を入れます。"}};
var PH={1:{lb:"アイスブレイク",cl:"#5E8B6A",ic:"☕"},2:{lb:"ニーズ深掘り",cl:"#B8976A",ic:"🔍"},3:{lb:"核心の質問",cl:"#C4713B",ic:"💎"},4:{lb:"クロージング",cl:"#8B6E4E",ic:"🎯"}};
var cur=null,rec=null,spk="none",custTxt="",liveTxt="",silTmr=null,cdPct=0,cdInt=null,WAIT=3000,ap=document.getElementById("app");
function ovlp(a,b){if(!a||!b)return 0;var s=a.replace(/[\s、。？！「」]/g,""),t=b.replace(/[\s、。？！「」]/g,"");if(s.length<3)return 0;var m=0,c=0;for(var i=0;i<=s.length-3;i++){if(t.indexOf(s.substring(i,i+3))>=0)m++;c++}return c>0?m/c:0}
function startMic(){var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){micErr();return}try{rec=new SR();rec.lang="ja-JP";rec.interimResults=true;rec.continuous=true;rec.onresult=function(e){var f="",im="";for(var i=0;i<e.results.length;i++){var t=e.results[i][0].transcript;if(e.results[i].isFinal)f+=t;else im+=t}liveTxt=f+im;onSpeech(liveTxt)};rec.onerror=function(e){if(e.error==="no-speech"){try{rec.start()}catch(x){}return}if(e.error==="not-allowed"){micErr();return}setTimeout(function(){try{rec.start()}catch(x){}},500)};rec.onend=function(){if(cur&&!N[cur].tp)setTimeout(function(){try{rec.start()}catch(x){}},200)};rec.start()}catch(e){micErr()}}
function stopMic(){if(rec){try{rec.stop()}catch(e){}}rec=null}
var staffEndPos=0;function onSpeech(txt){if(!cur||!N[cur])return;var n=N[cur];var fresh=txt.slice(staffEndPos);var o=ovlp(fresh,n.s);if(o>0.3){spk="staff";staffEndPos=txt.length;custTxt="";clrCd()}else if(fresh.trim().length>2){spk="customer";custTxt=fresh;rstCd()}updBar()}
function rstCd(){clrCd();cdPct=100;updCdBar();var st=Date.now();cdInt=setInterval(function(){cdPct=Math.max(0,100-((Date.now()-st)/WAIT)*100);updCdBar()},50);silTmr=setTimeout(function(){clrCd();if(custTxt.trim())adv(custTxt.trim())},WAIT)}
function clrCd(){if(silTmr){clearTimeout(silTmr);silTmr=null}if(cdInt){clearInterval(cdInt);cdInt=null}cdPct=0;updCdBar()}
function updCdBar(){var f=document.getElementById("cdFill");if(f)f.style.width=cdPct+"%"}
function updBar(){var d=document.getElementById("sDot"),lb=document.getElementById("sLbl"),tx=document.getElementById("sTxt");if(!d)return;if(spk==="staff"){d.style.background="#5E8B6A";lb.textContent="🏢 スタッフが話しています";lb.style.color="#5E8B6A";tx.className="status-text staff";tx.textContent=liveTxt||"…"}else if(spk==="customer"){d.style.background="#C4713B";lb.textContent="👤 お客様が話しています";lb.style.color="#C4713B";tx.className="status-text customer";tx.textContent=custTxt||"…"}else{d.style.background="#6B5D4F";lb.textContent="🎤 音声待機中…";lb.style.color="#6B5D4F";tx.className="status-text";tx.textContent="画面のセリフを読んでください"}}
function adv(r){if(!cur)return;var n=N[cur];stopMic();liveTxt="";custTxt="";spk="none";var nx=null;if(n.br)nx=n.br(r);else if(n.nx)nx=n.nx;if(nx&&N[nx]){cur=nx;draw();if(!N[nx].tp)setTimeout(startMic,500)}}
function rst(){stopMic();clrCd();cur=null;custTxt="";liveTxt="";spk="none";draw()}
function draw(){if(!cur){drawStart();return}var n=N[cur];if(n.tp==="handoff"){drawHO(n);return}if(n.tp==="end"){drawEnd(n);return}drawMain(n)}
function drawStart(){ap.innerHTML='<div class="full-screen"><div style="max-width:420px"><div class="fs-icon">🏠</div><div class="fs-title">AI ヒアリングナビ</div><div class="fs-sub">「最後の家を、誰かの未来に」</div><div class="fs-desc">画面に出る言葉をそのまま読むだけ。<br>お客様の回答は音声で自動認識します。<br><span>操作は一切不要です。</span></div><button class="start-btn" id="go">ヒアリングを開始する</button></div></div>';var b=document.getElementById("go");b.onclick=b.ontouchend=function(e){e.preventDefault();cur="start";draw();setTimeout(startMic,300)}}
function micErr(){ap.innerHTML='<div class="full-screen"><div style="max-width:420px"><div class="fs-icon">🎤</div><div class="fs-title" style="color:#E8A0A0">マイクを許可してください</div><div class="fs-desc">このアプリは音声入力が必要です。<br>Safariの設定でマイクを許可した後、<br>下のボタンで再開してください。</div><button class="start-btn" id="rt">もう一度試す</button></div></div>';var b=document.getElementById("rt");b.onclick=b.ontouchend=function(e){e.preventDefault();draw();setTimeout(startMic,300)}}
function drawHO(n){stopMic();ap.innerHTML='<div class="full-screen"><div style="max-width:520px"><div class="fs-icon">🤝</div><div class="handoff-title">担当者にバトンタッチ</div><div class="card handoff"><div class="card-label">お客様にこう伝えてください</div><div class="card-text">「'+n.s+'」</div>'+(n.t?'<div class="card-tone">💡 '+n.t+'</div>':'')+'</div>'+(n.rs?'<div class="info-box"><div class="info-box-label">担当者への申し送り：</div><div class="info-box-text">'+n.rs+'</div></div>':'')+'<button class="reset-btn" id="rb">最初に戻る</button></div></div>';var b=document.getElementById("rb");b.onclick=b.ontouchend=function(e){e.preventDefault();rst()}}
function drawEnd(n){stopMic();ap.innerHTML='<div class="full-screen"><div style="max-width:520px"><div class="fs-icon">📋</div><div class="end-title">ヒアリング完了</div><div class="card end"><div class="card-label">お客様にこう伝えてください</div><div class="card-text">「'+n.s+'」</div>'+(n.t?'<div class="card-tone">💡 '+n.t+'</div>':'')+'</div>'+(n.ea?'<div class="info-box"><div class="info-box-label">次にやること：</div><div class="info-box-text">'+n.ea+'</div></div>':'')+'<button class="reset-btn" id="rb">最初に戻る</button></div></div>';var b=document.getElementById("rb");b.onclick=b.ontouchend=function(e){e.preventDefault();rst()}}
function drawMain(n){var ph=PH[n.p];ap.innerHTML='<div class="phase-bar"><div class="phase-info"><span class="phase-icon">'+ph.ic+'</span><div><div class="phase-num">フェーズ '+n.p+'</div><div class="phase-label" style="color:'+ph.cl+'">'+ph.lb+'</div></div></div><div class="progress">'+[1,2,3,4].map(function(i){return'<div class="progress-dot" style="background:'+(i<=n.p?ph.cl:'#3A3228')+'"></div>'}).join("")+'</div></div><div class="content">'+(n.t?'<div class="tone-hint">💡 '+n.t+'</div>':'')+'<div class="card"><div class="card-label">お客様にこう伝えてください</div><div class="card-text">「'+n.s+'」</div></div>'+(n.l?'<div class="listen-hint">👂 聞きたいこと：<span>'+n.l+'</span></div>':'')+'</div><div class="status-bar"><div class="status-speaker"><div class="speaker-dot" id="sDot" style="background:#6B5D4F"></div><div class="speaker-label" id="sLbl" style="color:#6B5D4F">🎤 音声待機中…</div></div><div class="status-text" id="sTxt">画面のセリフを読んでください</div><div class="countdown-bar"><div class="countdown-fill" id="cdFill" style="width:0%"></div></div></div>'}
draw();
</script>
</body>
</html>
