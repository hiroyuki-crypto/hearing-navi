<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI ヒアリングナビ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#1A1714;color:#E8E0D4;min-height:100vh;display:flex;flex-direction:column}
.phase-bar{background:#211E18;border-bottom:1px solid #3A3228;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.phase-info{display:flex;align-items:center;gap:10px}
.phase-icon{font-size:22px}.phase-num{font-size:11px;color:#9B8E7E;font-weight:600}.phase-label{font-size:16px;font-weight:700}
.progress{display:flex;gap:5px}.dot{width:28px;height:5px;border-radius:3px}
.content{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px;gap:14px}
.tone{display:inline-block;align-self:flex-start;background:rgba(184,151,106,0.1);border:1px solid rgba(184,151,106,0.25);border-radius:10px;padding:7px 16px;font-size:15px;color:#B8976A;font-weight:600}
.card{background:#2C2418;border-radius:20px;padding:28px 22px;border:2px solid #3A3228}
.card-lbl{font-size:12px;color:#9B8E7E;font-weight:600;margin-bottom:14px;letter-spacing:0.1em}
.card-txt{font-size:20px;font-weight:600;line-height:2;color:#E8E0D4}
.hint{text-align:center;font-size:14px;color:#6B5D4F}.hint span{color:#9B8E7E}
.btn-listen{background:#5E8B6A;color:#fff;border:none;border-radius:16px;padding:18px;font-size:17px;font-weight:700;width:100%;cursor:pointer;touch-action:manipulation}
.btn-listen.on{background:#C4713B}
.status{flex-shrink:0;background:#211E18;border-top:1px solid #3A3228;padding:16px 20px}
.stxt{background:#2C2418;border-radius:14px;padding:14px 16px;font-size:15px;line-height:1.8;color:#E8E0D4;min-height:52px;border:1px solid #3A3228}
.cbar{height:4px;background:#3A3228;border-radius:2px;margin-top:10px;overflow:hidden}
.cfill{height:100%;background:#C4713B;width:0%;transition:width 0.1s}
.fs{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center}
.fs-icon{font-size:56px;margin-bottom:20px}.fs-title{font-size:22px;font-weight:700;margin-bottom:6px}
.fs-sub{font-size:13px;color:#B8976A;margin-bottom:6px}
.fs-desc{font-size:15px;color:#6B5D4F;line-height:2.2;margin:28px 0 40px}.fs-desc span{color:#9B8E7E}
.btn-start{background:#C4713B;color:#fff;border:none;border-radius:16px;padding:20px 48px;font-size:18px;font-weight:700;cursor:pointer;touch-action:manipulation}
.btn-reset{margin-top:32px;background:#3A3228;color:#E8E0D4;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer}
.card.ho{border-color:#5A3A28}.card.en{border-color:#2A4A32}
.ibox{background:#1A2A20;border-radius:14px;padding:20px;border:1px solid #2A4A32;margin-top:20px;text-align:left}
.ibox-lbl{font-size:11px;color:#5E8B6A;font-weight:600;margin-bottom:6px}
.ibox-txt{font-size:14px;color:#A0D4B0;line-height:2}
.ho-title{font-size:20px;font-weight:700;color:#C4713B;margin-bottom:24px}
.en-title{font-size:20px;font-weight:700;color:#5E8B6A;margin-bottom:24px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var APIKEY="sk-ant-api03-2RAK8VAk7-rmNVe5FIi8ThToVsBE98e6_WL3OOTzyI9A5Yz1rE3x25Z5BsiShYhIOulFVXZtIL-hwCipkDVenw-N6mtnwAA";
var N={start:{p:1,s:"本日はお越しいただきありがとうございます。まずは今のお住まいのこと、少し聞かせていただけますか。今のお家は築何年くらいですか？",t:"笑顔で、ゆっくりと",l:"築年数",nx:"floor"},floor:{p:1,s:"ありがとうございます。2階は普段使われていますか？",t:"うなずきながら",l:"2階の利用状況",next:["floor_unused","floor_used"],cond:"2階を使っていないまたは階段がしんどい場合はfloor_unused、使っている場合はfloor_used"},floor_unused:{p:1,s:"そうですよね、階段はだんだんしんどくなりますよね。同じようなお声、本当に多いんですよ。今のお住まいで一番「困っているな」と感じることは何ですか？",t:"共感するように",l:"住まいの一番の不満",nx:"rebuild_q"},floor_used:{p:1,s:"なるほど。ちなみに、今のお住まいで「ここが不便だな」と感じていることはありますか？",t:"興味を持って",l:"住まいの不満",nx:"rebuild_q"},rebuild_q:{p:2,s:"ありがとうございます。ちなみに、建て替えはこれまで考えたことはありましたか？",t:"さりげなく",l:"建て替え検討の有無",next:["rebuild_yes","rebuild_no"],cond:"建て替えを考えたことがある場合はrebuild_yes、ない場合はrebuild_no"},rebuild_yes:{p:2,s:"そうだったんですね。それでも踏み切れなかったのは、何かネックになることがあったんですか？",t:"寄り添うように",l:"踏み切れない理由",next:["signal_no_heir","signal_mottainai","signal_akiya","cost_concern","family_q"],cond:"子供や跡継ぎがいない話が出ればsignal_no_heir、もったいないという話ならsignal_mottainai、空き家への懸念ならsignal_akiya、費用や予算の話ならcost_concern、それ以外はfamily_q"},rebuild_no:{p:2,s:"なるほど。今の家にこのまま住み続けるご予定ですか？それとも、いつかは何か変えたいなというお気持ちはありますか？",t:"ゆっくりと",l:"将来への考え",nx:"family_q"},cost_concern:{p:2,s:"費用のこと、大事ですよね。よくわかります。ちなみにご家族構成を教えていただいてもいいですか？お子さんはいらっしゃいますか？",t:"丁寧に",l:"家族構成",next:["signal_no_heir","has_children","future_q"],cond:"子供がいない場合はsignal_no_heir、子供がいる場合はhas_children、不明な場合はfuture_q"},family_q:{p:2,s:"ありがとうございます。ちなみに、ご家族構成を教えていただいてもいいですか？お子さんはいらっしゃいますか？",t:"自然に",l:"家族構成",next:["signal_no_heir","has_children","future_q"],cond:"子供がいない場合はsignal_no_heir、子供がいる場合はhas_children、不明な場合はfuture_q"},signal_no_heir:{p:3,s:"そうなんですね。ありがとうございます。…ちなみに、将来この家をどうされたいとか、何かお考えはありますか？",t:"落ち着いて、ゆっくり",l:"家の将来への考え",next:["pitch_hot","pitch_akiya","pitch_soft"],cond:"寄付や社会貢献の話が出ればpitch_hot、空き家や処分の話ならpitch_akiya、それ以外はpitch_soft"},signal_mottainai:{p:3,s:"「もったいない」って思いますよね。すごくよくわかります。ちなみにお子さんはいらっしゃいますか？",t:"共感して",l:"家族構成",next:["signal_no_heir","has_children"],cond:"子供がいない場合はsignal_no_heir、いる場合はhas_children"},signal_akiya:{p:3,s:"空き家のこと、気にされているんですね。実は最近、同じ悩みを持たれている方がとても多いんです。ちなみにお子さんはいらっしゃいますか？",t:"共感して",l:"家族構成",next:["signal_no_heir","has_children"],cond:"子供がいない場合はsignal_no_heir、いる場合はhas_children"},has_children:{p:3,s:"お子さんがいらっしゃるんですね。お子さんは将来この家に住まれるご予定ですか？それとも別のところにお住まいですか？",t:"自然に",l:"子供の居住予定",next:["pitch_family_stay","pitch_family_away"],cond:"子供がこの家に住む予定ならpitch_family_stay、住まない場合はpitch_family_away"},future_q:{p:3,s:"ありがとうございます。少し先のことをお聞きしてもいいですか？将来、この家をどうされたいと思っていますか？",t:"落ち着いて",l:"家の将来への考え",next:["pitch_family_away","pitch_soft"],cond:"子供や家族に残したい話ならpitch_family_away、それ以外はpitch_soft"},pitch_soft:{p:3,s:"実は最近、同じようなお悩みの方で「建て替える時に、家の未来も一緒に決めてしまう」という方が増えていまして。もったいないから建てない、じゃなくて、人の役に立てるから建てる、という考え方なんですが…少し詳しいお話、聞いてみたいですか？",t:"明るく、でも押さずに",l:"興味の有無",next:["handoff_warm","end_cool"],cond:"興味を示した場合はhandoff_warm、興味なさそうな場合はend_cool"},pitch_akiya:{p:3,s:"空き家を防ぐ方法として、建て替えの時に「住まなくなった後の使い道」まで決めてしまう仕組みがあるんです。たとえば売却してその代金をどこかに届けたり、賃貸として誰かに住んでもらったり。…少し詳しく聞いてみたいですか？",t:"丁寧に、安心感を持って",l:"興味の有無",next:["handoff_warm","end_cool"],cond:"興味を示した場合はhandoff_warm、興味なさそうな場合はend_cool"},pitch_hot:{p:3,s:"素晴らしいお考えですね！実はまさに、建て替えと同時に届け先を決められる仕組みがありまして。詳しいご説明ができる者がおりますので、少しお話しさせていただいてもいいですか？",t:"明るく嬉しそうに",l:"プロ接続の了承",nx:"handoff_hot"},pitch_family_away:{p:3,s:"なるほど。お子さんがこの家に住まれない場合、将来の家のことが少し気になりますよね。実は、建て替えの時に「家の未来」まで一緒に設計する仕組みがありまして。お子さんに資産として残すことも、社会に届けることもできるんです。少し聞いてみたいですか？",t:"寄り添うように",l:"興味の有無",next:["handoff_warm","end_cool"],cond:"興味を示した場合はhandoff_warm、興味なさそうな場合はend_cool"},pitch_family_stay:{p:3,s:"それは安心ですね。将来お子さんが住まれるなら、バリアフリーの平屋にしておくと長く使えますよ。平屋の間取りや費用について、詳しい者からご説明させていただいてもいいですか？",t:"自然に",l:"説明希望の有無",nx:"handoff_standard"},handoff_hot:{p:4,tp:"handoff",s:"ありがとうございます！それでは詳しい者をお呼びしますので、少々お待ちくださいね。",t:"嬉しそうに",rs:"お客様が寄付・社会貢献に強い関心。パターンA・Bを中心にご説明ください。"},handoff_warm:{p:4,tp:"handoff",s:"ありがとうございます。それでは、詳しい者からわかりやすくご説明させていただきますね。少々お待ちください。",t:"安心させるように",rs:"お客様が「家の未来」に興味あり。3パターンの概要からご説明ください。"},handoff_standard:{p:4,tp:"handoff",s:"ありがとうございます。それでは詳しい者をお呼びしますね。少々お待ちください。",t:"自然に",rs:"平屋の建て替えに興味あり。相続人がいるケース。パターンCを中心に。"},end_cool:{p:4,tp:"end",s:"もちろんです。無理にお勧めすることはありませんので、ご安心くださいね。本日は平屋のパンフレットをお渡ししますので、よかったらご覧になってみてください。本日はお越しいただき、ありがとうございました。",t:"笑顔で、温かく",ea:"パンフレットをお渡しして、お見送りしてください。後日フォローの電話を入れます。"}};
var PH={1:{lb:"アイスブレイク",cl:"#5E8B6A",ic:"☕"},2:{lb:"ニーズ深掘り",cl:"#B8976A",ic:"🔍"},3:{lb:"核心の質問",cl:"#C4713B",ic:"💎"},4:{lb:"クロージング",cl:"#8B6E4E",ic:"🎯"}};
var cur=null,rec=null,isOn=false,voiceTxt="",silTimer=null,cdTimer=null,cdPct=0,WAIT=4000;
var ap=document.getElementById("app");

async function judgeNext(answer){
  var n=N[cur];
  if(n.nx)return n.nx;
  if(!n.next||!n.cond)return null;
  var stEl=document.getElementById("stxt");
  if(stEl)stEl.textContent="🤔 AIが判断中…";
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":APIKEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:30,messages:[{role:"user",content:"質問：「"+n.s+"」\nお客様の回答：「"+answer+"」\n判断："+n.cond+"\n選択肢："+n.next.join(",")+"\n選択肢の1つだけ返してください。"}]})
    });
    var d=await res.json();
    var nx=d.content[0].text.trim().replace(/[^a-z_]/gi,"");
    return n.next.indexOf(nx)>=0?nx:n.next[0];
  }catch(e){
    console.error("API error:",e);
    return n.next[0];
  }
}

async function adv(answer){
  if(!cur)return;
  var nx=await judgeNext(answer);
  if(nx&&N[nx]){cur=nx;draw();}
}

function clearTimers(){
  if(silTimer){clearTimeout(silTimer);silTimer=null;}
  if(cdTimer){clearInterval(cdTimer);cdTimer=null;}
  cdPct=0;
  var f=document.getElementById("cfill");
  if(f)f.style.width="0%";
}

function startCountdown(){
  clearTimers();
  cdPct=100;
  var start=Date.now();
  cdTimer=setInterval(function(){
    cdPct=Math.max(0,100-((Date.now()-start)/WAIT)*100);
    var f=document.getElementById("cfill");
    if(f)f.style.width=cdPct+"%";
  },50);
  silTimer=setTimeout(function(){
    clearTimers();
    var answer=voiceTxt.trim();
    if(answer){
      stopListening();
      adv(answer);
    }
  },WAIT);
}

function startListening(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  if(rec){try{rec.stop();}catch(e){}}
  voiceTxt="";isOn=true;updateBtn();
  var stEl=document.getElementById("stxt");
  if(stEl)stEl.textContent="話してください…";
  rec=new SR();
  rec.lang="ja-JP";rec.interimResults=true;rec.continuous=true;
  rec.onresult=function(e){
    var s="";
    for(var i=0;i<e.results.length;i++)s+=e.results[i][0].transcript;
    voiceTxt=s;
    var stEl=document.getElementById("stxt");
    if(stEl)stEl.textContent=s;
    clearTimers();
    startCountdown();
  };
  rec.onerror=function(e){console.log("mic error:",e.error);};
  rec.onend=function(){};
  rec.start();
  startCountdown();
}

function stopListening(){
  isOn=false;
  clearTimers();
  if(rec){try{rec.stop();}catch(e){}}
  rec=null;
  updateBtn();
}

function updateBtn(){
  var b=document.getElementById("listenBtn");
  if(!b)return;
  if(isOn){b.textContent="🎤 聞いています…（タップで止める）";b.className="btn-listen on";}
  else{b.textContent="👂 お客様の返答を聞く";b.className="btn-listen";}
}

function resetAll(){stopListening();cur=null;voiceTxt="";draw();}

function draw(){
  if(!cur){
    ap.innerHTML='<div class="fs"><div style="max-width:420px"><div class="fs-icon">🏠</div><div class="fs-title">AI ヒアリングナビ</div><div class="fs-sub">「最後の家を、誰かの未来に」</div><div class="fs-desc">セリフを読み終えたら<br>「お客様の返答を聞く」を押してください。<br><span>AIがお客様の言葉を理解して次に進みます。</span></div><button class="btn-start" id="startBtn">ヒアリングを開始する</button></div></div>';
    document.getElementById("startBtn").onclick=function(){cur="start";draw();};
    return;
  }
  var n=N[cur];
  if(n.tp==="handoff"){
    ap.innerHTML='<div class="fs"><div style="max-width:520px"><div class="fs-icon">🤝</div><div class="ho-title">担当者にバトンタッチ</div><div class="card ho"><div class="card-lbl">お客様にこう伝えてください</div><div class="card-txt">「'+n.s+'」</div>'+(n.t?'<div style="margin-top:14px;font-size:14px;color:#B8976A;font-weight:600">💡 '+n.t+'</div>':'')+'</div>'+(n.rs?'<div class="ibox"><div class="ibox-lbl">担当者への申し送り：</div><div class="ibox-txt">'+n.rs+'</div></div>':'')+'<button class="btn-reset" id="resetBtn">最初に戻る</button></div></div>';
    document.getElementById("resetBtn").onclick=function(){resetAll();};
    return;
  }
  if(n.tp==="end"){
    ap.innerHTML='<div class="fs"><div style="max-width:520px"><div class="fs-icon">📋</div><div class="en-title">ヒアリング完了</div><div class="card en"><div class="card-lbl">お客様にこう伝えてください</div><div class="card-txt">「'+n.s+'」</div>'+(n.t?'<div style="margin-top:14px;font-size:14px;color:#B8976A;font-weight:600">💡 '+n.t+'</div>':'')+'</div>'+(n.ea?'<div class="ibox"><div class="ibox-lbl">次にやること：</div><div class="ibox-txt">'+n.ea+'</div></div>':'')+'<button class="btn-reset" id="resetBtn">最初に戻る</button></div></div>';
    document.getElementById("resetBtn").onclick=function(){resetAll();};
    return;
  }
  var ph=PH[n.p];
  ap.innerHTML='<div class="phase-bar"><div class="phase-info"><span class="phase-icon">'+ph.ic+'</span><div><div class="phase-num">フェーズ '+n.p+'</div><div class="phase-label" style="color:'+ph.cl+'">'+ph.lb+'</div></div></div><div class="progress">'+[1,2,3,4].map(function(i){return'<div class="dot" style="background:'+(i<=n.p?ph.cl:'#3A3228')+'"></div>';}).join("")+'</div></div><div class="content">'+(n.t?'<div class="tone">💡 '+n.t+'</div>':'')+'<div class="card"><div class="card-lbl">お客様にこう伝えてください</div><div class="card-txt">「'+n.s+'」</div></div>'+(n.l?'<div class="hint">👂 聞きたいこと：<span>'+n.l+'</span></div>':'')+'<button class="btn-listen" id="listenBtn">👂 お客様の返答を聞く</button></div><div class="status"><div class="stxt" id="stxt">セリフを読み終えたら上のボタンを押してください</div><div class="cbar"><div class="cfill" id="cfill" style="width:0%"></div></div></div>';
  document.getElementById("listenBtn").onclick=function(){
    if(isOn){
      stopListening();
      if(voiceTxt.trim()){adv(voiceTxt.trim());}
    }else{
      startListening();
    }
  };
}
draw();
</script>
</body>
</html>
